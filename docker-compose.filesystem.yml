services:
  sidecar:
    build:
      context: .
      dockerfile: apps/sidecar/Dockerfile
    environment:
      SIDECAR_HOST: 0.0.0.0
      SIDECAR_PORT: 4310
      OPENCLAW_STATE_DIR: /openclaw-state
      OPENCLAW_CONFIG_PATH: ${OPENCLAW_CONFIG_PATH:-/openclaw-state/openclaw.json}
      OPENCLAW_PROFILE: ${OPENCLAW_PROFILE:-}
      OPENCLAW_WORKSPACE_GLOB: ${OPENCLAW_WORKSPACE_GLOB:-/openclaw-state/workspace*}
      OPENCLAW_SOURCE_ROOT: ${OPENCLAW_SOURCE_ROOT:-}
    ports:
      - "${HOST_SIDECAR_PORT:-4310}:4310"
    volumes:
      - type: bind
        source: ${OPENCLAW_STATE_DIR_HOST:-/tmp/openclaw-state}
        target: /openclaw-state
        read_only: true
      - type: bind
        source: ${OPENCLAW_WORKSPACE_ROOT_HOST:-/tmp/openclaw-state}
        target: /openclaw-workspaces
        read_only: true
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4310/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  overlay-api:
    build:
      context: .
      dockerfile: apps/overlay-api/Dockerfile
    environment:
      OVERLAY_API_HOST: 0.0.0.0
      OVERLAY_API_PORT: 4300
      SIDECAR_BASE_URL: http://sidecar:4310
      SIDECAR_TIMEOUT_MS: ${SIDECAR_TIMEOUT_MS:-5000}
    depends_on:
      sidecar:
        condition: service_healthy
    ports:
      - "${HOST_OVERLAY_API_PORT:-4300}:4300"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4300/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  overlay-web:
    build:
      context: .
      dockerfile: apps/overlay-web/Dockerfile
    depends_on:
      overlay-api:
        condition: service_healthy
    ports:
      - "${HOST_OVERLAY_WEB_PORT:-5173}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ready >/dev/null || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
